name: C/C++ CI Ubuntu Latest
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install
      run: sudo apt-get install libreadline-dev 
    - name: make
      run: make
    - name: make check
      run: make check
